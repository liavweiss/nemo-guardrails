# Single config: input + output rails, no LLM (use mock or external LLM).
# Guards: keyword/pattern checks + Presidio PII.
#
# Jailbreak heuristics (gpt2-large perplexity) is intentionally NOT included here.
# gpt2-large requires ~3 GB RAM in-process — too heavy for a lightweight guard pod.
colang_version: "1.0"

rails:
  config:
    # Presidio (PII): pick entities to detect.
    sensitive_data_detection:
      input:
        entities:
          - PERSON
          - EMAIL_ADDRESS
          - PHONE_NUMBER
          - CREDIT_CARD
          - US_SSN
        score_threshold: 0.5  # reduce false positives (default 0.2)
      output:
        entities:
          - PERSON
          - EMAIL_ADDRESS
          - PHONE_NUMBER
          - CREDIT_CARD
        score_threshold: 0.5
  input:
    flows:
      - check input rail              # keywords + patterns (custom actions)
      - detect sensitive data on input  # Presidio PII
  output:
    flows:
      - check output rail               # harmful keywords (custom actions)
      - detect sensitive data on output # Presidio PII on response
      - allow output
