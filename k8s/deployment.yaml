apiVersion: apps/v1
kind: Deployment
metadata:
  name: nemo-guardrails
  namespace: nemo-guardrails
  labels:
    app: nemo-guardrails
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nemo-guardrails
  template:
    metadata:
      labels:
        app: nemo-guardrails
    spec:
      containers:
        - name: nemo-guardrails
          image: nemoguardrails:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /v1/rails/configs
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10   # gpt2-large can block the event loop briefly on first request
            failureThreshold: 6  # allow up to 60s for model/spaCy startup before marking unready
          resources:
            requests:
              memory: "1Gi"
              cpu: "100m"
            # gpt2-large (~3 GB) + spaCy (~700 MB) + NeMo (~500 MB) = ~4 Gi peak at runtime.
            # Limit must be >= 4 Gi to avoid OOMKill during gpt2-large inference.
            limits:
              memory: "5Gi"
              cpu: "1000m"
