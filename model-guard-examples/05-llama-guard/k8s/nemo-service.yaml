# NeMo Guardrails Service — exposes the NeMo guard server on port 8000.
apiVersion: v1
kind: Service
metadata:
  name: nemo-guardrails
  namespace: nemo-guardrails
  labels:
    app: nemo-guardrails
spec:
  selector:
    app: nemo-guardrails
  ports:
    - name: http
      port: 8000
      targetPort: 8000
