apiVersion: apps/v1
kind: Deployment
metadata:
  name: nemo-guardrails
  namespace: nemo-guardrails
  labels:
    app: nemo-guardrails
    tier: guard-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nemo-guardrails
  template:
    metadata:
      labels:
        app: nemo-guardrails
        tier: guard-proxy
    spec:
      containers:
        - name: nemo-guardrails
          image: nemoguardrails:latest
          imagePullPolicy: Never
          env:
            - name: OPENAI_API_KEY
              value: "dummy"
            - name: MAIN_MODEL_ENGINE
              value: "vllm_openai"
            - name: MAIN_MODEL_BASE_URL
              value: "http://localhost:8001/v1"
          ports:
            - name: http
              containerPort: 8000
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /v1/rails/configs
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /v1/rails/configs
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15

        - name: vllm
          image: public.ecr.aws/q9t5s3a7/vllm-cpu-release-repo:v0.17.1
          imagePullPolicy: IfNotPresent
          command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - "--model"
            - "meta-llama/Llama-Guard-3-1B"
            - "--port"
            - "8001"
            - "--dtype"
            - "bfloat16"
            - "--max-model-len"
            - "2048"
            - "--max-num-seqs"
            - "4"
            - "--enforce-eager"
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
            - name: VLLM_CPU_KVCACHE_SPACE
              value: "2"
          ports:
            - name: vllm-http
              containerPort: 8001
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              memory: "10Gi"
              cpu: "4"
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
